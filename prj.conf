# Kernel
CONFIG_HEAP_MEM_POOL_SIZE=4096

# I2C
CONFIG_I2C=y
CONFIG_I2C_SHELL=y
CONFIG_I2C_DUMP_MESSAGES=y

# Sensor subsystem
CONFIG_SENSOR=y
CONFIG_SENSOR_SHELL=y
CONFIG_SENSOR_INFO=y

# MPU6050 driver
CONFIG_MPU6050=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_STDOUT_CONSOLE=y

CONFIG_LOG_BACKEND_UART=y
# LSM9DS1 — both symbols required
CONFIG_LSM9DS1=y
CONFIG_LSM9DS1_MAG=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# Float printf support (picolibc-compatible)
CONFIG_CBPRINTF_FP_SUPPORT=y
